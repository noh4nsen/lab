apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage
  namespace: argocd
spec:
  project: default
  source: 
    repoURL: https://github.com/noh4nsen/kind-lab.git
    targetRevision: HEAD
    path: garage
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cnpg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
