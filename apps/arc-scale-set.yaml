apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-scale-set
  namespace: argocd
spec:
  project: default
  source: 
    repoURL: https://github.com/noh4nsen/lab.git
    targetRevision: HEAD
    path: cluster/bootstrap/arc/scale-set
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
