apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-api-2
  namespace: argocd
spec:
  project: default
  source: 
    repoURL: https://github.com/noh4nsen/lab.git
    targetRevision: HEAD
    path: src/test-api-2/chart
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: test-api-2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
