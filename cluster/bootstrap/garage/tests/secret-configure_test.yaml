suite: Secret Configure tests
templates:
  - secret-configure.yaml
tests:
  - it: should not create Secret when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should create Secret when enabled
    set:
      clusterConfig.enabled: true
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-garage-configure-script

  - it: should include configure.sh script
    set:
      clusterConfig.enabled: true
    asserts:
      - exists:
          path: stringData["configure.sh"]

  # Bucket permissions - string format
  - it: string bucket format should grant read and write
    set:
      clusterConfig.enabled: true
      clusterConfig.keys:
        my-key:
          secretName: my-secret
          keyId: keyId
          secretKey: secretKey
          buckets:
            - my-bucket
    asserts:
      - matchRegex:
          path: stringData["configure.sh"]
          pattern: "bucket allow my-bucket --key .* --read --write"

  # Bucket permissions - object format
  - it: object bucket with read and write should grant read and write
    set:
      clusterConfig.enabled: true
      clusterConfig.keys:
        my-key:
          secretName: my-secret
          keyId: keyId
          secretKey: secretKey
          buckets:
            - name: my-bucket
              read: true
              write: true
    asserts:
      - matchRegex:
          path: stringData["configure.sh"]
          pattern: "bucket allow my-bucket --key .* --read --write"
      - notMatchRegex:
          path: stringData["configure.sh"]
          pattern: "--owner"

  - it: object bucket with read only should not grant write
    set:
      clusterConfig.enabled: true
      clusterConfig.keys:
        my-key:
          secretName: my-secret
          keyId: keyId
          secretKey: secretKey
          buckets:
            - name: my-bucket
              read: true
    asserts:
      - matchRegex:
          path: stringData["configure.sh"]
          pattern: "bucket allow my-bucket --key .* --read"
      - notMatchRegex:
          path: stringData["configure.sh"]
          pattern: "bucket allow my-bucket --key .* --write"

  - it: object bucket with write only should not grant read
    set:
      clusterConfig.enabled: true
      clusterConfig.keys:
        my-key:
          secretName: my-secret
          keyId: keyId
          secretKey: secretKey
          buckets:
            - name: my-bucket
              write: true
    asserts:
      - matchRegex:
          path: stringData["configure.sh"]
          pattern: "bucket allow my-bucket --key .* --write"
      - notMatchRegex:
          path: stringData["configure.sh"]
          pattern: "bucket allow my-bucket --key .* --read"

  - it: object bucket with owner flag should include owner
    set:
      clusterConfig.enabled: true
      clusterConfig.keys:
        my-key:
          secretName: my-secret
          keyId: keyId
          secretKey: secretKey
          buckets:
            - name: my-bucket
              read: true
              write: true
              owner: true
    asserts:
      - matchRegex:
          path: stringData["configure.sh"]
          pattern: "bucket allow my-bucket --key .* --read --write --owner"

  - it: object bucket without owner flag should not include owner
    set:
      clusterConfig.enabled: true
      clusterConfig.keys:
        my-key:
          secretName: my-secret
          keyId: keyId
          secretKey: secretKey
          buckets:
            - name: my-bucket
              read: true
              write: true
    asserts:
      - notMatchRegex:
          path: stringData["configure.sh"]
          pattern: "--owner"

  - it: key with no buckets should not emit bucket allow
    set:
      clusterConfig.enabled: true
      clusterConfig.keys:
        my-key:
          secretName: my-secret
          keyId: keyId
          secretKey: secretKey
    asserts:
      - notMatchRegex:
          path: stringData["configure.sh"]
          pattern: "bucket allow"
