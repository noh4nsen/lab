apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: argo-server-vs
  namespace: argocd
spec:
  hosts:
    - "argo.local"
  gateways: ["istio-system/gateway"]
  http:
    - route:
      - destination:
          host: argocd-server.argocd.svc.cluster.local
          port:
            number: 80
